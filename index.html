<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kana Random Practice</title>
    <link rel="icon" href="public/favicon.ico" />
    <meta property="og:title" content="Kana Random Practice" />
    <meta
      property="og:description"
      content="A lightweight trainer for quick Hiragana, Katakana, and Kanji practice."
    />
    <meta property="og:image" content="public/OGImage.png" />
    <meta property="og:type" content="website" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: linear-gradient(135deg, #f8fafc, #e0f2fe);
        color: #0f172a;
        overflow: hidden;
        user-select: none;
      }

      button {
        font-family: inherit;
      }

      .top-actions {
        position: fixed;
        top: 18px;
        right: 18px;
        display: flex;
        gap: 10px;
        z-index: 100;
        flex-wrap: wrap;
        justify-content: flex-end;
        max-width: calc(100vw - 24px);
      }

      @media (max-width: 640px) {
        .top-actions {
          top: 12px;
          right: 12px;
          left: 12px;
          justify-content: flex-end;
        }
      }

      .mode-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        width: min(720px, calc(100vw - 32px));
        margin-bottom: 18px;
        pointer-events: none;
      }

      .mode-group {
        position: relative;
        pointer-events: auto;
        z-index: 30;
      }

      .kana-table-button,
      .mode-button,
      .answer-button {
        border: 0;
        border-radius: 999px;
        background: #0f172a;
        color: white;
        font-size: 16px;
        font-weight: 800;
        padding: 10px 16px;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
        transition:
          transform 0.15s ease,
          opacity 0.15s ease,
          background 0.15s ease;
      }

      .kana-table-button {
        min-width: 48px;
        font-size: 20px;
      }

      .mode-button.active {
        background: #2563eb;
      }

      .kana-table-button:hover,
      .mode-button:hover,
      .answer-button:hover {
        transform: translateY(-1px);
        opacity: 0.92;
      }

      .kanji-options {
        position: absolute;
        top: calc(100% + 10px);
        left: 50%;
        transform: translateX(-50%);
        width: 190px;
        border-radius: 18px;
        background: white;
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.22);
        padding: 12px;
        display: none;
        gap: 8px;
        flex-direction: column;
        z-index: 999;
      }

      .kanji-options.open {
        display: flex;
      }

      .kanji-options label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 800;
        color: #1e293b;
        cursor: pointer;
      }

      .practice-area {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 90px 24px 120px;
        cursor: pointer;
      }

      .card {
        width: min(560px, 92vw);
        min-height: 340px;
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.74);
        backdrop-filter: blur(18px);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.16);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        border: 1px solid rgba(255, 255, 255, 0.8);
      }

      .hint {
        font-size: 15px;
        color: #64748b;
        margin-bottom: 24px;
        text-align: center;
      }

      .kana-display {
        font-size: clamp(112px, 24vw, 220px);
        line-height: 1;
        font-weight: 800;
        letter-spacing: -0.08em;
      }

      .meta-text {
        margin-top: 16px;
        min-height: 24px;
        color: #64748b;
        font-size: 14px;
        font-weight: 700;
        text-align: center;
      }

      .bottom-panel {
        position: fixed;
        left: 50%;
        bottom: 28px;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        z-index: 9;
      }

      .answer-button {
        font-size: 17px;
        padding: 12px 22px;
        background: #2563eb;
      }

      .answer-text {
        min-height: 34px;
        font-size: 26px;
        font-weight: 900;
        color: #1e293b;
        text-align: center;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        z-index: 100;
      }

      .modal-overlay.open {
        display: flex;
      }

      .modal {
        width: min(960px, 96vw);
        max-height: min(780px, 90vh);
        overflow: hidden;
        border-radius: 28px;
        background: white;
        box-shadow: 0 30px 100px rgba(15, 23, 42, 0.35);
        padding: 24px;
        position: relative;
        display: flex;
        flex-direction: column;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 12px;
        background: white;
        z-index: 4;
        flex: 0 0 auto;
      }

      #tableContainer {
        overflow: auto;
        min-height: 0;
        flex: 1 1 auto;
        scroll-behavior: smooth;
      }

      .modal-title {
        font-size: 26px;
        font-weight: 900;
        margin: 0;
      }

      .close-button {
        border: 0;
        width: 40px;
        height: 40px;
        border-radius: 999px;
        background: #e2e8f0;
        color: #0f172a;

        display: flex;
        align-items: center;
        justify-content: center;

        padding: 0;
        cursor: pointer;
      }

      .kana-grid {
        width: 100%;
        border-collapse: separate;
        border-spacing: 8px;
      }

      .kana-grid th,
      .kana-grid td {
        min-width: 76px;
        border-radius: 14px;
        padding: 10px 8px;
        text-align: center;
        background: #f1f5f9;
        vertical-align: middle;
      }

      .kana-grid th {
        background: #dbeafe;
        font-size: 15px;
        color: #1e3a8a;
      }

      .kana-cell-char {
        display: block;
        font-size: 30px;
        font-weight: 900;
        line-height: 1.1;
      }

      .kana-cell-romaji {
        display: block;
        margin-top: 3px;
        font-size: 13px;
        color: #64748b;
        font-weight: 700;
      }

      .empty-cell {
        opacity: 0.35;
      }

      .kanji-section-title {
        margin: 22px 0 12px;
        padding-top: 16px;
        border-top: 2px solid #cbd5e1;
        font-size: 20px;
        font-weight: 900;
        opacity: 1;
        transform: translateY(0);
        transition:
          opacity 0.18s ease,
          transform 0.18s ease,
          height 0.18s ease,
          margin 0.18s ease,
          padding 0.18s ease;
      }

      #tableContainer.scrolled:not(.show-elementary-title)
        .kanji-outer-section:first-child
        .kanji-section-title {
        opacity: 0;
        transform: translateY(-8px);
        height: 0;
        margin: 0;
        padding: 0;
        overflow: hidden;
        border-top: 0;
      }

      .kanji-section-title:first-child {
        border-top: 0;
        padding-top: 0;
        margin-top: 0;
      }

      .kanji-outer-section + .kanji-outer-section {
        margin-top: 56px;
        padding-top: 18px;
      }

      .kanji-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
        gap: 6px;
      }

      .kanji-cell {
        min-height: 44px;
        border-radius: 10px;
        background: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 900;
      }

      .loading-text {
        color: #64748b;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.6;
      }

      .kanji-index {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        position: sticky;
        top: 0;
        z-index: 3;
        background: white;
        padding: 8px 0 12px;
        border-bottom: 1px solid #e2e8f0;
        margin-bottom: 12px;
      }

      .kanji-section-nav {
        display: none;
        position: relative;
        top: auto;
        z-index: 4;
        flex: 0 0 auto;
        margin: 0 0 10px;
        padding: 0 0 10px;
        border-bottom: 1px solid #e2e8f0;
        background: white;
      }

      .kanji-section-nav.open {
        display: flex;
      }

      .kanji-index-button {
        border: 0;
        border-radius: 999px;
        background: #dbeafe;
        color: #1e3a8a;
        font-size: 13px;
        font-weight: 900;
        padding: 6px 10px;
        cursor: pointer;
        transition:
          background 0.15s ease,
          color 0.15s ease,
          transform 0.15s ease;
      }

      .kanji-index-button.active {
        background: #2563eb;
        color: white;
      }

      .kanji-list-section {
        scroll-margin-top: 130px;
      }

      .kanji-list-section h4 {
        margin: 18px 0 8px;
        font-size: 18px;
        font-weight: 900;
        color: #1e293b;
      }

      .kanji-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 8px;
      }

      .kanji-list-item {
        display: flex;
        align-items: center;
        gap: 12px;
        border-radius: 14px;
        background: #f1f5f9;
        padding: 10px 12px;
      }

      .kanji-list-char {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 900;
        flex: 0 0 auto;
      }

      .kanji-list-info {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
        font-size: 13px;
        line-height: 1.35;
        color: #475569;
      }

      .kanji-list-info strong {
        color: #0f172a;
        font-size: 14px;
      }

      @media (max-width: 640px) {
        .top-actions {
          top: 12px;
          right: 12px;
          bottom: auto;
          left: auto;
          justify-content: flex-end;
        }

        .mode-actions {
          top: 12px;
        }

        .kana-grid {
          border-spacing: 5px;
        }

        .kana-grid th,
        .kana-grid td {
          min-width: 48px;
          padding: 8px 4px;
        }

        .kana-cell-char {
          font-size: 24px;
        }
        .modal {
          padding: 16px;
        }
        .modal-header {
          top: -16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="top-actions">
      <button class="kana-table-button" data-table="hiragana">あ</button>
      <button class="kana-table-button" data-table="katakana">ア</button>
      <button class="kana-table-button" data-table="kanji">漢</button>
    </div>

    <main class="practice-area" id="practiceArea">
      <div class="mode-actions">
        <div class="mode-group">
          <button class="mode-button active" data-mode="hiragana">
            히라가나만
          </button>
        </div>
        <div class="mode-group">
          <button class="mode-button" data-mode="katakana">가타카나만</button>
        </div>
        <div class="mode-group" id="kanjiModeGroup">
          <button class="mode-button" data-mode="kanji" id="kanjiModeButton">
            한자만
          </button>
          <div class="kanji-options" id="kanjiOptions">
            <label
              ><input type="checkbox" id="elementaryKanjiCheck" checked />
              초등학교 1,006자</label
            >
            <label
              ><input type="checkbox" id="secondaryKanjiCheck" checked /> 중학교
              1,130자</label
            >
          </div>
        </div>
      </div>

      <section class="card">
        <div class="hint" id="hintText">
          화면 아무데나 클릭하면 선택한 범위에서 랜덤 글자가 나옵니다.
        </div>
        <div class="kana-display" id="kanaDisplay">あ</div>
        <div class="meta-text" id="metaText"></div>
      </section>
    </main>

    <div class="bottom-panel">
      <button class="answer-button" id="answerButton">정답</button>
      <div class="answer-text" id="answerText"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
      <section
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
      >
        <header class="modal-header">
          <h2 class="modal-title" id="modalTitle">히라가나 표</h2>
          <button class="close-button" id="closeButton" aria-label="닫기">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path
                d="M6 6L18 18M18 6L6 18"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </header>
        <nav class="kanji-index kanji-section-nav" id="kanjiSectionNav">
          <button
            class="kanji-index-button active"
            data-target="elementary-top"
          >
            초등 한자
          </button>
          <button class="kanji-index-button" data-target="secondary-top">
            중등 한자
          </button>
        </nav>
        <div id="tableContainer"></div>
      </section>
    </div>

    <script>
      const hiragana = [
        { char: "あ", answer: "a" },
        { char: "い", answer: "i" },
        { char: "う", answer: "u" },
        { char: "え", answer: "e" },
        { char: "お", answer: "o" },
        { char: "か", answer: "ka" },
        { char: "き", answer: "ki" },
        { char: "く", answer: "ku" },
        { char: "け", answer: "ke" },
        { char: "こ", answer: "ko" },
        { char: "さ", answer: "sa" },
        { char: "し", answer: "shi" },
        { char: "す", answer: "su" },
        { char: "せ", answer: "se" },
        { char: "そ", answer: "so" },
        { char: "た", answer: "ta" },
        { char: "ち", answer: "chi" },
        { char: "つ", answer: "tsu" },
        { char: "て", answer: "te" },
        { char: "と", answer: "to" },
        { char: "な", answer: "na" },
        { char: "に", answer: "ni" },
        { char: "ぬ", answer: "nu" },
        { char: "ね", answer: "ne" },
        { char: "の", answer: "no" },
        { char: "は", answer: "ha" },
        { char: "ひ", answer: "hi" },
        { char: "ふ", answer: "fu" },
        { char: "へ", answer: "he" },
        { char: "ほ", answer: "ho" },
        { char: "ま", answer: "ma" },
        { char: "み", answer: "mi" },
        { char: "む", answer: "mu" },
        { char: "め", answer: "me" },
        { char: "も", answer: "mo" },
        { char: "や", answer: "ya" },
        null,
        { char: "ゆ", answer: "yu" },
        null,
        { char: "よ", answer: "yo" },
        { char: "ら", answer: "ra" },
        { char: "り", answer: "ri" },
        { char: "る", answer: "ru" },
        { char: "れ", answer: "re" },
        { char: "ろ", answer: "ro" },
        { char: "わ", answer: "wa" },
        null,
        null,
        null,
        { char: "を", answer: "wo" },
        { char: "ん", answer: "n" },
        null,
        null,
        null,
        null,
      ];

      const katakana = [
        { char: "ア", answer: "a" },
        { char: "イ", answer: "i" },
        { char: "ウ", answer: "u" },
        { char: "エ", answer: "e" },
        { char: "オ", answer: "o" },
        { char: "カ", answer: "ka" },
        { char: "キ", answer: "ki" },
        { char: "ク", answer: "ku" },
        { char: "ケ", answer: "ke" },
        { char: "コ", answer: "ko" },
        { char: "サ", answer: "sa" },
        { char: "シ", answer: "shi" },
        { char: "ス", answer: "su" },
        { char: "セ", answer: "se" },
        { char: "ソ", answer: "so" },
        { char: "タ", answer: "ta" },
        { char: "チ", answer: "chi" },
        { char: "ツ", answer: "tsu" },
        { char: "テ", answer: "te" },
        { char: "ト", answer: "to" },
        { char: "ナ", answer: "na" },
        { char: "ニ", answer: "ni" },
        { char: "ヌ", answer: "nu" },
        { char: "ネ", answer: "ne" },
        { char: "ノ", answer: "no" },
        { char: "ハ", answer: "ha" },
        { char: "ヒ", answer: "hi" },
        { char: "フ", answer: "fu" },
        { char: "ヘ", answer: "he" },
        { char: "ホ", answer: "ho" },
        { char: "マ", answer: "ma" },
        { char: "ミ", answer: "mi" },
        { char: "ム", answer: "mu" },
        { char: "メ", answer: "me" },
        { char: "モ", answer: "mo" },
        { char: "ヤ", answer: "ya" },
        null,
        { char: "ユ", answer: "yu" },
        null,
        { char: "ヨ", answer: "yo" },
        { char: "ラ", answer: "ra" },
        { char: "リ", answer: "ri" },
        { char: "ル", answer: "ru" },
        { char: "レ", answer: "re" },
        { char: "ロ", answer: "ro" },
        { char: "ワ", answer: "wa" },
        null,
        null,
        null,
        { char: "ヲ", answer: "wo" },
        { char: "ン", answer: "n" },
        null,
        null,
        null,
        null,
      ];

      const wikipediaApiUrl =
        "https://en.wikipedia.org/w/api.php?action=parse&page=List_of_j%C5%8Dy%C5%8D_kanji&prop=text&format=json&origin=*";
      const kanaDisplay = document.getElementById("kanaDisplay");
      const answerText = document.getElementById("answerText");
      const metaText = document.getElementById("metaText");
      const practiceArea = document.getElementById("practiceArea");
      const answerButton = document.getElementById("answerButton");
      const modalOverlay = document.getElementById("modalOverlay");
      const modalTitle = document.getElementById("modalTitle");
      const tableContainer = document.getElementById("tableContainer");
      const kanjiSectionNav = document.getElementById("kanjiSectionNav");
      const closeButton = document.getElementById("closeButton");
      const kanjiOptions = document.getElementById("kanjiOptions");
      const elementaryKanjiCheck = document.getElementById(
        "elementaryKanjiCheck",
      );
      const secondaryKanjiCheck = document.getElementById(
        "secondaryKanjiCheck",
      );
      const activeModes = new Set(["hiragana"]);

      let currentItem = hiragana[0];
      const emptyItem = { char: "?", answer: "" };
      let elementaryKanji = [];
      let secondaryKanji = [];
      let kanjiLoadState = "loading";
      let lockedIndexTargetId = null;

      const kanaIndexOrder = [
        "あ",
        "い",
        "う",
        "え",
        "お",
        "か",
        "き",
        "く",
        "け",
        "こ",
        "さ",
        "し",
        "す",
        "せ",
        "そ",
        "た",
        "ち",
        "つ",
        "て",
        "と",
        "な",
        "に",
        "ぬ",
        "ね",
        "の",
        "は",
        "ひ",
        "ふ",
        "へ",
        "ほ",
        "ま",
        "み",
        "む",
        "め",
        "も",
        "や",
        "ゆ",
        "よ",
        "ら",
        "り",
        "る",
        "れ",
        "ろ",
        "わ",
        "を",
        "ん",
      ];

      function cleanText(value) {
        return value
          .split("[")
          .join(" ")
          .split("]")
          .join(" ")
          .replaceAll("  ", " ")
          .trim();
      }

      function firstKana(value) {
        for (const char of value) {
          const code = char.charCodeAt(0);
          if (code >= 12353 && code <= 12435) return char;
          if (code >= 12449 && code <= 12531)
            return String.fromCharCode(code - 96);
        }
        return "その他";
      }

      async function loadKanji() {
        try {
          const response = await fetch(wikipediaApiUrl);
          const data = await response.json();
          const doc = new DOMParser().parseFromString(
            data.parse.text["*"],
            "text/html",
          );
          const rows = [...doc.querySelectorAll("table.wikitable tbody tr")];
          const loadedElementary = [];
          const loadedSecondary = [];

          for (const row of rows) {
            const cells = [...row.querySelectorAll("td")];
            if (cells.length < 7) continue;

            const char = cleanText(cells[1].textContent).charAt(0);
            const grade = cleanText(cells[5].textContent);
            const meaning = cleanText(cells[cells.length - 2].textContent);
            const readings = cleanText(cells[cells.length - 1].textContent);

            if (!char) continue;

            const item = {
              char,
              answer: readings + (meaning ? " / " + meaning : ""),
              readings,
              meaning,
              grade,
              kanaIndex: firstKana(readings),
            };

            if (["1", "2", "3", "4", "5", "6"].includes(grade))
              loadedElementary.push(item);
            if (grade === "S") loadedSecondary.push(item);
          }

          elementaryKanji = sortKanji(loadedElementary);
          secondaryKanji = sortKanji(loadedSecondary);
          kanjiLoadState =
            elementaryKanji.length && secondaryKanji.length ? "ready" : "error";
        } catch (error) {
          kanjiLoadState = "error";
          console.error(error);
        }

        updateMetaText();

        const isKanjiTableOpen =
          modalOverlay.classList.contains("open") &&
          kanjiSectionNav.classList.contains("open");

        if (isKanjiTableOpen) {
          tableContainer.innerHTML = buildKanjiTable();
          tableContainer.classList.remove("scrolled");
          tableContainer.classList.remove("show-elementary-title");
          tableContainer.scrollTop = 0;

          kanjiSectionNav
            .querySelectorAll(".kanji-index-button")
            .forEach((button) => {
              button.classList.toggle(
                "active",
                button.dataset.target === "elementary-top",
              );
            });

          requestAnimationFrame(updateKanjiSectionNavActive);
        }
      }

      function sortKanji(items) {
        return [...items].sort((a, b) => a.char.localeCompare(b.char, "ja"));
      }

      function getSelectedKanji() {
        if (kanjiLoadState !== "ready") return [];
        const selected = [];
        if (elementaryKanjiCheck.checked) selected.push(...elementaryKanji);
        if (secondaryKanjiCheck.checked) selected.push(...secondaryKanji);
        return selected;
      }

      function getActiveItems() {
        const selected = [];
        if (activeModes.has("hiragana"))
          selected.push(...hiragana.filter(Boolean));
        if (activeModes.has("katakana"))
          selected.push(...katakana.filter(Boolean));
        if (activeModes.has("kanji")) selected.push(...getSelectedKanji());
        return selected;
      }

      function updateMetaText() {
        const labels = [];
        if (activeModes.has("hiragana")) labels.push("히라가나");
        if (activeModes.has("katakana")) labels.push("가타카나");
        if (activeModes.has("kanji")) {
          if (kanjiLoadState === "loading") labels.push("한자 불러오는 중");
          if (kanjiLoadState === "error") labels.push("한자 불러오기 실패");
          if (kanjiLoadState === "ready")
            labels.push(
              "한자 " + getSelectedKanji().length.toLocaleString() + "자",
            );
        }
        const count = getActiveItems().length;

        if (!count) {
          resetToEmptyState();
          return;
        }

        metaText.textContent =
          labels.join(" + ") + " / 총 " + count.toLocaleString() + "자";
      }

      function pickRandomItem() {
        const items = getActiveItems();
        answerText.textContent = "";
        updateMetaText();
        if (!items.length) {
          resetToEmptyState();
          return;
        }
        currentItem = items[Math.floor(Math.random() * items.length)];
        kanaDisplay.textContent = currentItem.char;
      }

      function showAnswer(event) {
        event.stopPropagation();
        answerText.textContent = currentItem.answer || "";
      }

      function buildKanaTable(items) {
        const headers = ["a", "i", "u", "e", "o"];
        let html =
          '<table class="kana-grid"><thead><tr>' +
          headers.map((header) => "<th>" + header + "</th>").join("") +
          "</tr></thead><tbody>";
        for (let i = 0; i < items.length; i += 5) {
          html += "<tr>";
          for (const item of items.slice(i, i + 5)) {
            if (!item) html += '<td class="empty-cell">—</td>';
            else
              html +=
                '<td><span class="kana-cell-char">' +
                item.char +
                '</span><span class="kana-cell-romaji">' +
                item.answer +
                "</span></td>";
          }
          html += "</tr>";
        }
        html += "</tbody></table>";
        return html;
      }

      function groupedByKana(items) {
        const groups = new Map();
        for (const item of items) {
          const key = item.kanaIndex || "その他";
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(item);
        }
        return groups;
      }

      function buildKanjiList(title, items, prefix) {
        const groups = groupedByKana(items);
        const keys = kanaIndexOrder.filter((key) => groups.has(key));
        if (groups.has("その他")) keys.push("その他");
        const indexButtons = keys
          .map(
            (key) =>
              '<button class="kanji-index-button" data-target="' +
              prefix +
              "-" +
              key +
              '">' +
              key +
              "</button>",
          )
          .join("");
        const sections = keys
          .map((key) => {
            const listItems = groups
              .get(key)
              .map(
                (item) =>
                  '<li class="kanji-list-item"><span class="kanji-list-char">' +
                  item.char +
                  '</span><span class="kanji-list-info"><strong>' +
                  (item.readings || "읽기 정보 없음") +
                  "</strong><span>" +
                  (item.meaning || "뜻 정보 없음") +
                  "</span></span></li>",
              )
              .join("");
            return (
              '<section class="kanji-list-section" id="' +
              prefix +
              "-" +
              key +
              '"><h4>' +
              key +
              '</h4><ul class="kanji-list">' +
              listItems +
              "</ul></section>"
            );
          })
          .join("");
        return (
          '<section class="kanji-outer-section"><h3 class="kanji-section-title" id="' +
          prefix +
          '-top">' +
          title +
          " " +
          items.length.toLocaleString() +
          '자</h3><nav class="kanji-index">' +
          indexButtons +
          "</nav>" +
          sections +
          "</section>"
        );
      }

      function buildKanjiTable() {
        if (kanjiLoadState === "loading")
          return '<p class="loading-text">한자 목록을 불러오는 중입니다.</p>';
        if (kanjiLoadState === "error")
          return '<p class="loading-text">한자 목록을 불러오지 못했습니다. 브라우저에서 Wikipedia API 접근이 가능한지 확인해 주세요.</p>';
        return (
          buildKanjiList("초등학교 학습 한자", elementaryKanji, "elementary") +
          buildKanjiList("중학교 학습 한자", secondaryKanji, "secondary")
        );
      }

      function openTable(type, event) {
        event.stopPropagation();
        kanjiSectionNav.classList.toggle("open", type === "kanji");
        tableContainer.classList.remove("scrolled");
        tableContainer.classList.remove("show-elementary-title");
        lockedIndexTargetId = null;
        tableContainer.scrollTop = 0;

        if (type === "hiragana") {
          modalTitle.textContent = "히라가나 표";
          tableContainer.innerHTML = buildKanaTable(hiragana);
        }
        if (type === "katakana") {
          modalTitle.textContent = "가타카나 표";
          tableContainer.innerHTML = buildKanaTable(katakana);
        }
        if (type === "kanji") {
          modalTitle.textContent = "상용 한자 표";
          tableContainer.innerHTML = buildKanjiTable();
          kanjiSectionNav
            .querySelectorAll(".kanji-index-button")
            .forEach((button) => {
              button.classList.toggle(
                "active",
                button.dataset.target === "elementary-top",
              );
            });
          requestAnimationFrame(updateKanjiSectionNavActive);
        }
        modalOverlay.classList.add("open");
      }

      function closeModal() {
        modalOverlay.classList.remove("open");
      }

      function getCurrentItemMode() {
        if (!currentItem || currentItem === emptyItem) return null;
        if (hiragana.filter(Boolean).includes(currentItem)) return "hiragana";
        if (katakana.filter(Boolean).includes(currentItem)) return "katakana";
        if (
          elementaryKanji.includes(currentItem) ||
          secondaryKanji.includes(currentItem)
        ) {
          return "kanji";
        }
        return null;
      }

      function syncModeButtons() {
        document.querySelectorAll(".mode-button").forEach((button) => {
          button.classList.toggle(
            "active",
            activeModes.has(button.dataset.mode),
          );
        });
      }

      function refreshAfterModeChange(wasCurrentModeDisabled) {
        const activeItems = getActiveItems();

        syncModeButtons();

        if (!activeItems.length) {
          resetToEmptyState();
          return;
        }

        if (wasCurrentModeDisabled || kanaDisplay.textContent === "?") {
          pickRandomItem();
          return;
        }

        updateMetaText();
      }

      function toggleMode(nextMode, event) {
        event.stopPropagation();

        const hadNoActiveItems = getActiveItems().length === 0;
        const currentItemMode = getCurrentItemMode();
        let wasCurrentModeDisabled = false;

        if (nextMode === "kanji") {
          if (kanjiOptions.classList.contains("open")) {
            const wasKanjiActive = activeModes.has("kanji");
            closeKanjiOptionsWithValidation();

            wasCurrentModeDisabled =
              wasKanjiActive &&
              !activeModes.has("kanji") &&
              currentItemMode === "kanji";

            if (wasCurrentModeDisabled && getActiveItems().length > 0) {
              pickRandomItem();
            }

            return;
          }

          if (activeModes.has("kanji")) {
            kanjiOptions.classList.add("open");
            updateMetaText();
            return;
          }

          resetKanjiCheckboxes();
          activeModes.add("kanji");
          kanjiOptions.classList.add("open");
        } else {
          if (activeModes.has(nextMode)) {
            activeModes.delete(nextMode);
            wasCurrentModeDisabled = currentItemMode === nextMode;
          } else {
            activeModes.add(nextMode);
          }
        }

        if (hadNoActiveItems && getActiveItems().length > 0) {
          syncModeButtons();
          pickRandomItem();
          return;
        }

        refreshAfterModeChange(wasCurrentModeDisabled);
      }

      practiceArea.addEventListener("click", (event) => {
        if (
          event.target.closest("button") ||
          event.target.closest(".kanji-options")
        )
          return;

        if (
          kanjiOptions.classList.contains("open") &&
          !document.getElementById("kanjiModeGroup").contains(event.target)
        ) {
          closeKanjiOptionsWithValidation();
          return;
        }

        pickRandomItem();
      });

      answerButton.addEventListener("click", showAnswer);
      closeButton.addEventListener("click", closeModal);

      document.querySelectorAll(".kana-table-button").forEach((button) => {
        button.addEventListener("click", (event) =>
          openTable(button.dataset.table, event),
        );
      });

      document.querySelectorAll(".mode-button").forEach((button) => {
        button.addEventListener("click", (event) =>
          toggleMode(button.dataset.mode, event),
        );
      });

      function resetKanjiCheckboxes() {
        elementaryKanjiCheck.checked = true;
        secondaryKanjiCheck.checked = true;
        updateMetaText();
      }

      function closeKanjiOptionsWithValidation() {
        const hasAnyKanjiRange =
          elementaryKanjiCheck.checked || secondaryKanjiCheck.checked;

        if (!hasAnyKanjiRange) {
          activeModes.delete("kanji");
          document.querySelectorAll(".mode-button").forEach((button) => {
            button.classList.toggle(
              "active",
              activeModes.has(button.dataset.mode),
            );
          });
        }

        kanjiOptions.classList.remove("open");
        updateMetaText();
      }

      function resetToEmptyState() {
        kanaDisplay.textContent = "?";
        currentItem = emptyItem;
        answerText.textContent = "";
        metaText.textContent = "하나 이상의 버튼을 선택해주세요.";
      }

      function getCurrentKanjiRange() {
        if (!currentItem || currentItem === emptyItem) return null;
        if (elementaryKanji.includes(currentItem)) return "elementary";
        if (secondaryKanji.includes(currentItem)) return "secondary";
        return null;
      }

      function isCurrentKanjiStillSelectable() {
        const currentKanjiRange = getCurrentKanjiRange();

        if (!currentKanjiRange) return true;
        if (!activeModes.has("kanji")) return false;
        if (currentKanjiRange === "elementary")
          return elementaryKanjiCheck.checked;
        if (currentKanjiRange === "secondary")
          return secondaryKanjiCheck.checked;

        return true;
      }

      function syncKanjiModeFromCheckboxChange() {
        const hadNoActiveItems = getActiveItems().length === 0;
        const currentKanjiRange = getCurrentKanjiRange();
        const hasAnyKanjiRange =
          elementaryKanjiCheck.checked || secondaryKanjiCheck.checked;

        if (!hasAnyKanjiRange) {
          activeModes.delete("kanji");
          syncModeButtons();

          if (getActiveItems().length > 0) {
            if (currentKanjiRange) {
              pickRandomItem();
            } else {
              updateMetaText();
            }
          } else {
            resetToEmptyState();
          }

          return;
        }

        activeModes.add("kanji");
        syncModeButtons();

        if (
          hadNoActiveItems ||
          kanaDisplay.textContent === "?" ||
          !isCurrentKanjiStillSelectable()
        ) {
          pickRandomItem();
          return;
        }

        updateMetaText();
      }

      kanjiOptions.addEventListener("click", (event) => {
        event.stopPropagation();
        updateMetaText();
      });

      elementaryKanjiCheck.addEventListener(
        "change",
        syncKanjiModeFromCheckboxChange,
      );
      secondaryKanjiCheck.addEventListener(
        "change",
        syncKanjiModeFromCheckboxChange,
      );

      function getStickyIndexHeightForTarget(target) {
        const section = target.closest(".kanji-outer-section");
        if (!section) return 0;

        const stickyIndex = section.querySelector(".kanji-index");
        if (!stickyIndex) return 0;

        return stickyIndex.getBoundingClientRect().height;
      }

      function getTargetElementForButton(button) {
        const targetId = button.dataset.target;
        const section = button.closest(".kanji-outer-section");

        if (section) {
          const scopedTarget = section.querySelector(
            "#" + CSS.escape(targetId),
          );
          if (scopedTarget) return scopedTarget;
        }

        return document.getElementById(targetId);
      }

      function scrollKanjiTarget(targetId, sourceButton = null) {
        const target = sourceButton
          ? getTargetElementForButton(sourceButton)
          : document.getElementById(targetId);

        if (!target) return;

        tableContainer.classList.toggle(
          "show-elementary-title",
          target.id === "elementary-top",
        );

        const containerTop = tableContainer.getBoundingClientRect().top;
        const targetTop = target.getBoundingClientRect().top;
        const isSectionTitleTarget = target.classList.contains(
          "kanji-section-title",
        );
        const stickyIndexHeight = isSectionTitleTarget
          ? 0
          : getStickyIndexHeightForTarget(target);
        const gapBelowStickyIndex = isSectionTitleTarget ? 0 : 8;
        const sectionTitleTopPadding = target.id === "secondary-top" ? 22 : 0;

        const offset =
          tableContainer.scrollTop +
          targetTop -
          containerTop -
          stickyIndexHeight -
          gapBelowStickyIndex -
          sectionTitleTopPadding;

        tableContainer.scrollTo({
          top: Math.max(0, offset),
          behavior: "smooth",
        });
      }

      function updateKanjiSectionNavActive() {
        const elementaryTopForTitle = document.getElementById("elementary-top");
        if (
          tableContainer.classList.contains("show-elementary-title") &&
          !lockedIndexTargetId &&
          elementaryTopForTitle &&
          Math.abs(
            elementaryTopForTitle.getBoundingClientRect().top -
              tableContainer.getBoundingClientRect().top,
          ) > 28
        ) {
          tableContainer.classList.remove("show-elementary-title");
        }

        if (lockedIndexTargetId) {
          const target = document.getElementById(lockedIndexTargetId);

          if (target) {
            const containerTop = tableContainer.getBoundingClientRect().top;
            const targetTop = target.getBoundingClientRect().top;
            const isSectionTitleTarget = target.classList.contains(
              "kanji-section-title",
            );
            const stickyIndexHeight = isSectionTitleTarget
              ? 0
              : getStickyIndexHeightForTarget(target);
            const gapBelowStickyIndex = isSectionTitleTarget ? 0 : 8;
            const sectionTitleTopPadding =
              target.id === "secondary-top" ? 21 : 0;
            const expectedTop =
              containerTop +
              stickyIndexHeight +
              gapBelowStickyIndex +
              sectionTitleTopPadding;
            const distance = Math.abs(targetTop - expectedTop);

            if (distance > 8) {
              setActiveIndexButton(lockedIndexTargetId);
              return;
            }
          }

          lockedIndexTargetId = null;
        }

        const elementaryTop = document.getElementById("elementary-top");
        const secondaryTop = document.getElementById("secondary-top");
        const buttons = kanjiSectionNav.querySelectorAll(".kanji-index-button");

        tableContainer.classList.toggle(
          "scrolled",
          tableContainer.scrollTop > 8,
        );

        if (!elementaryTop || !secondaryTop) {
          buttons.forEach((button) => {
            button.classList.toggle(
              "active",
              button.dataset.target === "elementary-top",
            );
          });
          return;
        }

        if (tableContainer.scrollTop <= 8) {
          buttons.forEach((button) => {
            button.classList.toggle(
              "active",
              button.dataset.target === "elementary-top",
            );
          });
          return;
        }

        const containerTop = tableContainer.getBoundingClientRect().top;
        const secondaryTitleTop = secondaryTop.getBoundingClientRect().top;
        const activeTarget =
          secondaryTitleTop <= containerTop + 24
            ? "secondary-top"
            : "elementary-top";

        buttons.forEach((button) => {
          button.classList.toggle(
            "active",
            button.dataset.target === activeTarget,
          );
        });

        // Highlight on kana index.
        const visibleKanaSections = [
          ...tableContainer.querySelectorAll(".kanji-list-section"),
        ];

        let currentKanaSection = visibleKanaSections[0];

        for (const section of visibleKanaSections) {
          const sectionTop = section.getBoundingClientRect().top;
          const containerTop = tableContainer.getBoundingClientRect().top;
          const stickyIndexHeight = getStickyIndexHeightForTarget(section);
          const gapBelowStickyIndex = 8;
          const highlightLine =
            containerTop + stickyIndexHeight + gapBelowStickyIndex + 4;

          if (sectionTop <= highlightLine) {
            currentKanaSection = section;
          } else {
            break;
          }
        }

        tableContainer
          .querySelectorAll(
            ".kanji-outer-section .kanji-index .kanji-index-button",
          )
          .forEach((button) => {
            const isActive =
              currentKanaSection &&
              button.dataset.target === currentKanaSection.id;

            button.classList.toggle("active", isActive);
          });
      }

      function getSectionNavTargetForIndex(targetId) {
        if (targetId.startsWith("secondary-")) return "secondary-top";
        return "elementary-top";
      }

      function setActiveIndexButton(targetId, lock = false) {
        if (lock) lockedIndexTargetId = targetId;

        const sectionNavTarget = getSectionNavTargetForIndex(targetId);

        kanjiSectionNav
          .querySelectorAll(".kanji-index-button")
          .forEach((button) => {
            button.classList.toggle(
              "active",
              button.dataset.target === sectionNavTarget,
            );
          });

        tableContainer
          .querySelectorAll(
            ".kanji-outer-section .kanji-index .kanji-index-button",
          )
          .forEach((button) => {
            button.classList.toggle(
              "active",
              button.dataset.target === targetId,
            );
          });
      }

      kanjiSectionNav.addEventListener("click", (event) => {
        const button = event.target.closest(".kanji-index-button");
        if (!button) return;
        event.stopPropagation();

        setActiveIndexButton(button.dataset.target, true);
        scrollKanjiTarget(button.dataset.target, button);
      });

      tableContainer.addEventListener("scroll", updateKanjiSectionNavActive);

      tableContainer.addEventListener("click", (event) => {
        const button = event.target.closest(".kanji-index-button");
        if (!button) return;

        setActiveIndexButton(button.dataset.target, true);
        scrollKanjiTarget(button.dataset.target, button);
      });

      document.addEventListener("click", (event) => {
        if (
          !document.getElementById("kanjiModeGroup").contains(event.target) &&
          kanjiOptions.classList.contains("open")
        ) {
          closeKanjiOptionsWithValidation();
        }
      });

      modalOverlay.addEventListener("click", (event) => {
        if (event.target === modalOverlay) closeModal();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeModal();
      });

      loadKanji();
    </script>
  </body>
</html>
